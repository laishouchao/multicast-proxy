# multicast_proxy.conf - 配置文件
# 每行一个 key=value，# 开头为注释

# HTTP 监听端口
port=8888

# 上游组播接口 (根据实际路由器接口修改)
iface=eth0.2

# 最大同时观看客户端数
max_clients=200

# 组播接收缓冲区 (字节)
rcvbuf=1048576

# 会话缓存秒数 (最后一个客户端断开后保持组播)
grace_sec=5

# SSM 源地址 (留空=ASM模式, 填写=SSM模式)
# ssm_source=10.253.18.18

# M3U 播放列表文件路径
m3u_file=/etc/multicast_proxy.m3u

# 详细日志 (0=关闭, 1=开启)
verbose=0

# 嗅探模式 (0=关闭, 1=开启)
# 开启后自动嗅探IGMP join报文，发现IPTV频道
# sniffer_mode=1

# 嗅探接口 (默认使用上游接口)
# 如果机顶盒在特定接口，可以指定
# mcast_iface=br-lan
