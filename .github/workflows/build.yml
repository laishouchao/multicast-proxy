name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: false
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # === 主要目标: OpenWrt mipsel_24kc (WR1200JS / MT7621) ===
          - arch: mipsel_24kc
            name: openwrt-mipsel
            native: false
            sdk_url: "https://archive.openwrt.org/releases/17.01.7/targets/ramips/mt7621/lede-sdk-17.01.7-ramips-mt7621_gcc-5.4.0_musl-1.1.16.Linux-x86_64.tar.xz"
          # === 次要目标: x86_64 静态 (仅用于开发测试) ===
          - arch: x86_64-linux-musl
            cc: musl-gcc
            name: linux-x86_64
            native: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install musl-tools (native only)
        if: matrix.native
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq musl-tools

      - name: Compile (native x86_64)
        if: matrix.native
        run: |
          musl-gcc -O2 -Wall -Wextra -pthread \
            -static -o multicast_proxy multicast_proxy.c
          file multicast_proxy
          ls -lh multicast_proxy

      - name: Download OpenWrt SDK (cross-compile only)
        if: ${{ !matrix.native }}
        run: |
          echo "Downloading SDK from: ${{ matrix.sdk_url }}"
          wget -q --show-progress "${{ matrix.sdk_url }}" -O sdk.tar.xz
          ls -lh sdk.tar.xz

      - name: Compile (cross-compile mipsel)
        if: ${{ !matrix.native }}
        run: |
          echo "Extracting SDK..."
          tar xf sdk.tar.xz
          SDK_DIR=$(ls -d lede-sdk-* | head -1)
          echo "SDK directory: ${SDK_DIR}"

          # 查找工具链 gcc 路径
          GCC_BIN=$(find "${SDK_DIR}/staging_dir" -name "mipsel-openwrt-linux-musl-gcc" -type f | head -1)
          if [ -z "$GCC_BIN" ]; then
            echo "ERROR: mipsel toolchain gcc not found!"
            echo "Available in staging_dir:"
            find "${SDK_DIR}/staging_dir" -name "*gcc*" -type f 2>/dev/null | head -20
            exit 1
          fi

          GCC_BIN=$(readlink -f "$GCC_BIN")
          TOOLCHAIN_DIR=$(dirname "$GCC_BIN")
          PREFIX="mipsel-openwrt-linux-musl-"

          echo "Toolchain dir: ${TOOLCHAIN_DIR}"
          echo "GCC: ${GCC_BIN}"
          ${GCC_BIN} --version

          # 添加工具链到 PATH
          export PATH="${TOOLCHAIN_DIR}:${PATH}"

          # 使用 Makefile 交叉编译 (静态链接)
          make CROSS_COMPILE="${PREFIX}" LDFLAGS="-pthread -static" clean
          make CROSS_COMPILE="${PREFIX}" LDFLAGS="-pthread -static"

          # strip 减小体积
          ${PREFIX}strip multicast_proxy

          file multicast_proxy
          ls -lh multicast_proxy

      - name: Package
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          if [[ "$VERSION" == refs/* ]]; then VERSION=""; fi
          [ -z "$VERSION" ] && VERSION="${{ github.event.inputs.version }}"
          [ -z "$VERSION" ] && VERSION="dev"

          tar czf multicast_proxy-${VERSION}-${{ matrix.name }}.tar.gz \
            multicast_proxy \
            multicast_proxy.init \
            multicast_proxy.uci \
            README.md \
            example.conf

          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Package: multicast_proxy-${VERSION}-${{ matrix.name }}.tar.gz"

      - name: Verify binary architecture
        run: |
          echo "=== Binary info ==="
          file multicast_proxy
          echo "=== File size ==="
          ls -lh multicast_proxy
          if [ "${{ matrix.native }}" != "true" ]; then
            readelf -h multicast_proxy 2>/dev/null | grep -E "Class|Machine" || true
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: multicast_proxy-${{ matrix.name }}
          path: multicast_proxy-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            multicast_proxy-*/multicast_proxy-*.tar.gz
          body: |
            ## Multicast Proxy

            All-in-One IPTV proxy for OpenWrt — 替代 igmpproxy + udpxy。

            ### 文件说明

            | 文件 | 架构 | 说明 |
            |------|------|------|
            | `*-openwrt-mipsel.tar.gz` | **mipsel_24kc** | **OpenWrt 路由器使用** (WR1200JS / MT7621) |
            | `*-linux-x86_64.tar.gz` | x86_64 | 开发测试用 |

            ### 安装 (OpenWrt 路由器)

            ```bash
            # 解压 (选择 mipsel 版本)
            tar xzf multicast_proxy-*-openwrt-mipsel.tar.gz

            # 复制到路由器
            scp multicast_proxy root@<router_ip>:/usr/bin/
            scp multicast_proxy.init root@<router_ip>:/etc/init.d/multicast_proxy
            scp multicast_proxy.uci root@<router_ip>:/etc/config/multicast_proxy

            # 启用
            ssh root@<router_ip> "chmod +x /usr/bin/multicast_proxy /etc/init.d/multicast_proxy"
            ssh root@<router_ip> "/etc/init.d/multicast_proxy enable && /etc/init.d/multicast_proxy start"
            ```

            ### 使用

            ```
            播放: http://<router_ip>:8888/udp/232.0.1.210:1234
            状态: http://<router_ip>:8888/status
            列表: http://<router_ip>:8888/playlist
            ```
